name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# 避免同時多個部署互相取消：新跑等待，而非取消進行中的跑
concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish dir
        run: |
          mkdir -p publish
          cp supremacy1914_dashboard.html publish/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          keep_files: false
          enable_jekyll: false
